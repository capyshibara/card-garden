<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#CC785C" />
  <title>Card Garden</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="headerEyebrow">A calm study space</p>
        <h1 id="headerTitle">Learn</h1>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
      <button class="icon-button" id="backButton" aria-label="Back" hidden>←</button>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button class="nav-item" data-tab="home">Learn</button>
      <button class="nav-item" data-tab="cards">Cards</button>
      <button class="nav-item" data-tab="metrics">Stats</button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="app.js"></script>

<div id="loadingOverlay" style="
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background:#EBDBBC;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  font-size:18px;
">
  Signing you in...
</div>


<script>
function showLoading() {
  var el = document.getElementById("loadingOverlay");
  if (el) el.style.display = "flex";
}
function hideLoading() {
  var el = document.getElementById("loadingOverlay");
  if (el) el.style.display = "none";
}

if (typeof firebase !== "undefined" && firebase.auth) {
  firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  firebase.auth().getRedirectResult()
    .then(function(result) {
      hideLoading();
    })
    .catch(function(error) {
      console.error(error);
      hideLoading();
    });
}
</script>


<div class="metrics-export">
  <button onclick="exportJSON()">Export JSON</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<div class="version-box">
  Card Garden v45<br/>@capyshibara
</div>


<div id="filterModal" class="filter-modal">
  <div class="filter-box">
    <h3>Filter</h3>
    <label>Status</label>
    <input id="filterStatus" placeholder="Learning"/>

    <label>Labels (comma)</label>
    <input id="filterLabels" placeholder="analysis, brainstorming"/>

    <div>
      <label><input type="radio" name="filterMode" value="OR" checked> OR</label>
      <label><input type="radio" name="filterMode" value="AND"> AND</label>
    </div>

    <div class="filter-actions">
      <button onclick="closeFilter()">Cancel</button>
      <button onclick="applyFilter()">Apply</button>
    </div>
  </div>
</div>

</body>
</html>
